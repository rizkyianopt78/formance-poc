apiVersion: apps/v1
kind: Deployment
metadata:
  name: hydra-hydra-maester
  labels:
    app.kubernetes.io/name: hydra-maester
    helm.sh/chart: hydra-maester-0.61.1
    app.kubernetes.io/instance: hydra
    app.kubernetes.io/version: "v0.0.41"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      control-plane: controller-manager
      app.kubernetes.io/name: hydra-hydra-maester
      app.kubernetes.io/instance: hydra
  template:
    metadata:
      labels:
        control-plane: controller-manager
        app.kubernetes.io/name: hydra-hydra-maester
        app.kubernetes.io/instance: hydra
      annotations:
    spec:
      volumes:
      terminationGracePeriodSeconds: 60
      containers:
        - name: hydra-maester
          image: "docker.io/oryd/hydra-maester:v0.0.41"
          imagePullPolicy: IfNotPresent
          command:
            - /manager
          args:
            - --metrics-addr=127.0.0.1:8080
            - --hydra-url=http://hydra-admin
            - --hydra-port=4445
            - --endpoint=/admin/clients
          volumeMounts:
          resources: {}
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            privileged: false
            readOnlyRootFilesystem: true
            runAsGroup: 65534
            runAsNonRoot: true
            runAsUser: 65534
            seLinuxOptions:
              level: s0:c123,c456
            seccompProfile:
              type: RuntimeDefault
          ports:
      serviceAccountName: hydra-hydra-maester-account
      automountServiceAccountToken: true
      nodeSelector:
      securityContext:
        fsGroup: 65534
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 65534
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
