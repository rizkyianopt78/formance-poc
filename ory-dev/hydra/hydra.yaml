apiVersion: apps/v1
kind: Deployment
metadata:
  name: hydra
  namespace: ory-sit
  labels:
    "app.kubernetes.io/name": "hydra"
    "app.kubernetes.io/instance": "hydra"
    "app.kubernetes.io/version": "v26.2.0"
    "app.kubernetes.io/managed-by": "Helm"
    "helm.sh/chart": "hydra-0.61.1"
  annotations:
spec:
  replicas: 1
  revisionHistoryLimit: 5
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: hydra
      app.kubernetes.io/instance: hydra
  template:
    metadata:
      labels:
        "app.kubernetes.io/name": "hydra"
        "app.kubernetes.io/instance": "hydra"
        "app.kubernetes.io/version": "v26.2.0"
        "app.kubernetes.io/managed-by": "Helm"
        "helm.sh/chart": "hydra-0.61.1"
      annotations:
        checksum/hydra-config: 00fcf4220bf59c19d4532201b9f7017723fa6acb3f758b0aebee9537ad79e45e
        checksum/hydra-secrets: 230d771444f6bf274a40e3ca9561e0574b4ff21ddd91a9fdd6f490f646c91988
    spec:
      volumes:
        - name: hydra-config-volume
          configMap:
            name: hydra
      serviceAccountName: hydra
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 60
      containers:
        - name: hydra
          image: "docker.io/oryd/hydra:v26.2.0"
          imagePullPolicy: IfNotPresent
          command:
            - hydra
          args:
            - serve
            - all
            - "--dev"
            - --config
            - /etc/config/hydra.yaml
          volumeMounts:
            - name: hydra-config-volume
              mountPath: /etc/config
              readOnly: true
          ports:
            - name: http-public
              containerPort: 4444
              protocol: TCP
            - name: http-admin
              containerPort: 4445
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /health/alive
              port: 4445
              httpHeaders:
                - name: Host
                  value: "127.0.0.1"
            failureThreshold: 5
            initialDelaySeconds: 5
            periodSeconds: 10
          startupProbe:
            httpGet:
              path: /health/ready
              port: 4445
              httpHeaders:
                - name: Host
                  value: "127.0.0.1"
            failureThreshold: 5
            initialDelaySeconds: 1
            periodSeconds: 1
            successThreshold: 1
            timeoutSeconds: 2
          env:
            - name: URLS_SELF_ISSUER
              value: "http://127.0.0.1:4444/"
            - name: DSN
              valueFrom:
                secretKeyRef:
                  name: hydra
                  key: dsn
            - name: SECRETS_SYSTEM
              valueFrom:
                secretKeyRef:
                  name: hydra
                  key: secretsSystem
            - name: SECRETS_COOKIE
              valueFrom:
                secretKeyRef:
                  name: hydra
                  key: secretsCookie
          resources: {}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            privileged: false
            readOnlyRootFilesystem: true
            runAsGroup: 65534
            runAsNonRoot: true
            runAsUser: 65534
            seLinuxOptions:
              level: s0:c123,c456
            seccompProfile:
              type: RuntimeDefault
          lifecycle: {}
      initContainers:
      securityContext:
        fsGroup: 65534
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 65534
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
