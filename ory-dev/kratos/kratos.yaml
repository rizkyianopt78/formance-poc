kratos:
  config:
    dsn: postgres://ory:ory@nw-dbapp-dev.cj2ayui6qtj7.ap-south-1.rds.amazonaws.com/kratos?sslDisable=true

    secrets:
      default:
        - supersecretkey12345super
      cookie:
        - anotherverysecretkey12345
    session:
      cookie:
        domain: localhost
        path: /
        same_site: Lax

    oauth2_provider:
      url: http://hydra-admin:4445

    selfservice:
      default_browser_return_url: http://localhost:3800

      methods:
        password:
          enabled: true

        oidc:
          enabled: true
          config:
            providers:
              - id: google
                provider: google
                client_id:
                client_secret:
                mapper_url: base64://bG9jYWwgY2xhaW1zID0gewogIGVtYWlsX3ZlcmlmaWVkOiBmYWxzZSwKfSArIHN0ZC5leHRWYXIoJ2NsYWltcycpOwoKewogIGlkZW50aXR5OiB7CiAgICB0cmFpdHM6IHsKICAgICAgZW1haWw6IGNsYWltcy5lbWFpbCwKICAgICAgbmFtZTogY2xhaW1zLm5hbWUKICAgIH0sCiAgfSwKfQ==
                scope:
                  - openid
                  - email
                  - profile

      flows:
        login:
          ui_url: http://localhost:3800/auth/signin
        registration:
          ui_url: http://localhost:3800/auth/signup
          after:
            password:
              hooks:
                - hook: session
        error:
          ui_url: http://localhost:3800/auth/signin

    identity:
      default_schema_id: default
      schemas:
        - id: default
          url: base64:

    courier:
      delivery_strategy: smtp
      smtp:
        connection_uri: smtps://user:pass@mailhog:1025/?skip_ssl_verify=true

    serve:
      public:
        base_url: http://localhost:4433
        cors:
          enabled: true
          allowed_origins:
            - http://localhost:3800
          allowed_methods:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
          allowed_headers:
            - Authorization
            - Cookie
            - Content-Type
          exposed_headers:
            - Content-Type
            - Set-Cookie
            - Location
          allow_credentials: true

      admin:
        base_url: http://localhost:4434

  automigration:
    enabled: true
