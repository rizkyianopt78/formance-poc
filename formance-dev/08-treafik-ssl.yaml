apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: formance-route
spec:
  entryPoints:
    - websecure
  routes:
  - match: Host(`formance.dev.netwallet.co`)
    kind: Rule
    services:
    - name: console
      port: 3000
    middlewares:
    - name: redirect-https
  tls:
    certResolver: myresolver
