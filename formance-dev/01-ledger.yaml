        - name: reconciliation
          image: ghcr.io/formancehq/reconciliation:latest
          args:
            - serve
            - --auto-migrate
          ports:
            - containerPort: 8080
          env:
            - name: POSTGRES_URI
              value: postgres://ledger:ledger@nw-dbapp-dev.cj2ayui6qtj7.ap-south-1.rds.amazonaws.com/ledger?sslmode=disable&search_path=reconciliations
---
apiVersion: v1
kind: Service
metadata:
  name: reconciliation
  namespace: nw-dev
spec:
  selector:
    app: reconciliation
  ports:
    - port: 8080
      targetPort: 8080

---
########################
# TEMPORAL
########################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal
  namespace: nw-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: temporal
  template:
    metadata:
      labels:
        app: temporal
    spec:
      containers:
        - name: temporal
          image: temporalio/auto-setup:1.22.3
          ports:
            - containerPort: 7233
          env:
            # DB type must be 'postgresql' (not 'temporal')
            - name: DB
              value: "postgresql"
            - name: DB_PORT
              value: "5432"
            - name: POSTGRES_USER
              value: "ledger"
            - name: POSTGRES_PWD
              value: "ledger"
            # POSTGRES_SEEDS uses IP because cluster DNS can't resolve external RDS hostname
            # nw-dbapp-dev.cj2ayui6qtj7.ap-south-1.rds.amazonaws.com resolves to 10.1.3.125
            - name: POSTGRES_SEEDS
              value: "10.1.3.125"
            - name: ENABLE_ES
              value: "false"

            # Skip missing dynamic config file
            - name: DYNAMIC_CONFIG_FILE_PATH
              value: "/etc/temporal/config/dynamicconfig.yaml"
          volumeMounts:
            - name: dynamic-config
              mountPath: /etc/temporal/config/dynamicconfig.yaml
              subPath: dynamicconfig.yaml
      volumes:
        - name: dynamic-config
          configMap:
            name: temporal-dynamic-config

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: temporal-dynamic-config
  namespace: nw-dev
data:
  dynamicconfig.yaml: |
    # empty dynamic config

---
apiVersion: v1
kind: Service
metadata:
  name: temporal
  namespace: nw-dev
spec:
  selector:
    app: temporal
  ports:
    - port: 7233
      targetPort: 7233
