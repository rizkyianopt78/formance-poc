apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: formance-sit
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: formance-sit
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:18-alpine
          args:
            - -c
            - max_connections=200
            - -c
            - log_min_messages=info
          env:
            - name: POSTGRES_USER
              value: ledger
            - name: POSTGRES_PASSWORD
              value: ledger
            - name: POSTGRES_DB
              value: ledger
            - name: PGDATA
              value: /data/postgres
          ports:
            - containerPort: 5432
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "ledger"]
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          volumeMounts:
            - name: postgres-storage
              mountPath: /data/postgres
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: formance-sit
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
